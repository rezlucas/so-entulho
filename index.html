<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Só Entulho - Goianésia-GO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 18px;
      background: #0d1117;
      color: #f0f0f0;
      overflow: hidden;
      height: 100vh;
    }

    /* ===== MAP SCREEN ===== */
    #map-screen {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #btn-ver-lista {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      min-height: 55px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    #btn-ver-lista:active { background: #0d47a1; }

    /* ===== LIST SCREEN ===== */
    #list-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0d1117;
      z-index: 2000;
      overflow-y: auto;
      padding: 20px 16px 100px;
    }

    #list-screen h1 {
      font-size: 26px;
      text-align: center;
      margin-bottom: 22px;
      color: #fff;
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
    }

    .cacamba-item {
      background: #161b22;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 18px;
      border-left: 8px solid #555;
    }

    .cacamba-item.status-ok     { border-left-color: #2ecc71; }
    .cacamba-item.status-hoje   { border-left-color: #f39c12; }
    .cacamba-item.status-vencida{ border-left-color: #e74c3c; }

    .cacamba-nome {
      font-size: 21px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #fff;
    }

    .cacamba-info {
      font-size: 17px;
      color: #bbb;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .cacamba-status-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .status-ok     .cacamba-status-badge { background: #2ecc71; color: #000; }
    .status-hoje   .cacamba-status-badge { background: #f39c12; color: #000; }
    .status-vencida .cacamba-status-badge { background: #e74c3c; color: #fff; }

    .cacamba-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .cacamba-btns button {
      flex: 1;
      min-width: 90px;
      min-height: 52px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px 6px;
      letter-spacing: 0.3px;
    }

    .btn-busquei  { background: #2ecc71; color: #000; }
    .btn-apagar   { background: #e74c3c; color: #fff; }
    .btn-ver-mapa { background: #1565c0; color: #fff; }
    .btn-editar   { background: #7b1fa2; color: #fff; }

    .btn-busquei:active  { background: #27ae60; }
    .btn-apagar:active   { background: #c0392b; }
    .btn-ver-mapa:active { background: #0d47a1; }
    .btn-editar:active   { background: #6a1b9a; }

    #btn-voltar-mapa {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3000;
      background: #424242;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: bold;
      min-height: 55px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    #btn-voltar-mapa:active { background: #212121; }

    /* ===== FORM MODAL ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    #modal-overlay.active { display: flex; }

    #modal {
      background: #161b22;
      border-radius: 14px;
      padding: 24px 20px;
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      border: 1px solid #30363d;
    }

    #modal h2 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 22px;
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 18px;
      margin-bottom: 7px;
      color: #ccc;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      font-size: 18px;
      padding: 13px 12px;
      border-radius: 7px;
      border: 2px solid #30363d;
      background: #0d1117;
      color: #f0f0f0;
      min-height: 52px;
      font-family: inherit;
    }

    .form-group textarea {
      min-height: 88px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #1565c0;
    }

    .modal-btns {
      display: flex;
      gap: 14px;
      margin-top: 22px;
    }

    .modal-btns button {
      flex: 1;
      min-height: 58px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #btn-salvar   { background: #2ecc71; color: #000; }
    #btn-cancelar { background: #e74c3c; color: #fff; }
    #btn-salvar:active   { background: #27ae60; }
    #btn-cancelar:active { background: #c0392b; }

    /* ===== ALERT ===== */
    #alert-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #alert-overlay.active { display: flex; }

    #alert-box {
      background: #b71c1c;
      border-radius: 14px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    #alert-box h2 {
      font-size: 26px;
      margin-bottom: 16px;
    }

    #alert-msg {
      font-size: 20px;
      margin-bottom: 26px;
      line-height: 1.5;
    }

    #btn-fechar-alert {
      background: #fff;
      color: #b71c1c;
      border: none;
      border-radius: 10px;
      padding: 15px 36px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      min-height: 55px;
    }

    /* ===== CONFIRM ===== */
    #confirm-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 8000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #confirm-overlay.active { display: flex; }

    #confirm-box {
      background: #161b22;
      border-radius: 14px;
      padding: 30px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid #30363d;
    }

    #confirm-box p {
      font-size: 20px;
      margin-bottom: 26px;
      color: #fff;
      line-height: 1.5;
    }

    .confirm-btns {
      display: flex;
      gap: 14px;
    }

    .confirm-btns button {
      flex: 1;
      min-height: 55px;
      font-size: 19px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #btn-confirmar-apagar { background: #e74c3c; color: #fff; }
    #btn-cancelar-apagar  { background: #424242; color: #fff; }

    /* ===== LEAFLET POPUP OVERRIDE ===== */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      font-size: 16px;
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 190px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-msg {
      text-align: center;
      color: #888;
      margin-top: 50px;
      font-size: 20px;
      line-height: 1.6;
    }

    /* ===== RESPONSIVE 320px ===== */
    @media (max-width: 360px) {
      body { font-size: 16px; }
      #modal { padding: 18px 14px; }
      .cacamba-btns button { font-size: 13px; min-height: 48px; }
      .modal-btns button { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- MAP SCREEN -->
<div id="map-screen">
  <div id="map"></div>
  <button id="btn-ver-lista">VER LISTA</button>
</div>

<!-- LIST SCREEN -->
<div id="list-screen">
  <h1>Caçambas</h1>
  <div id="lista-container"></div>
  <button id="btn-voltar-mapa">VOLTAR AO MAPA</button>
</div>

<!-- FORM MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-titulo">Nova Caçamba</h2>
    <form id="form-cacamba" novalidate>
      <div class="form-group">
        <label for="inp-nome">Nome do cliente *</label>
        <input type="text" id="inp-nome" placeholder="Nome completo" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="inp-tel">Telefone</label>
        <input type="tel" id="inp-tel" placeholder="(62) 99999-9999" autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="inp-deixou">Data que deixou</label>
        <input type="date" id="inp-deixou">
      </div>
      <div class="form-group">
        <label for="inp-buscar">Data para buscar *</label>
        <input type="date" id="inp-buscar">
      </div>
      <div class="form-group">
        <label for="inp-obs">Observações</label>
        <textarea id="inp-obs" placeholder="Endereço, referência, etc..."></textarea>
      </div>
      <div class="modal-btns">
        <button type="button" id="btn-cancelar">CANCELAR</button>
        <button type="submit" id="btn-salvar">SALVAR</button>
      </div>
    </form>
  </div>
</div>

<!-- ALERT OVERLAY -->
<div id="alert-overlay">
  <div id="alert-box">
    <h2>⚠ ATENÇÃO</h2>
    <p id="alert-msg"></p>
    <button id="btn-fechar-alert">OK, ENTENDI</button>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Tem certeza que deseja apagar esta caçamba?</p>
    <div class="confirm-btns">
      <button id="btn-cancelar-apagar">NÃO</button>
      <button id="btn-confirmar-apagar">SIM, APAGAR</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ============================================================
// DATA LAYER
// ============================================================
const STORAGE_KEY = 'cacambas_goianesia_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveData(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function getToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getStatus(dataBuscar) {
  const t = getToday();
  if (!dataBuscar) return 'ok';
  if (dataBuscar < t) return 'vencida';
  if (dataBuscar === t) return 'hoje';
  return 'ok';
}

function statusLabel(s) {
  return s === 'vencida' ? 'VENCIDA' : s === 'hoje' ? 'VENCE HOJE' : 'NO PRAZO';
}

function fmtDate(iso) {
  if (!iso) return '-';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// MAP
// ============================================================
const map = L.map('map', { zoomControl: true, attributionControl: false })
              .setView([-15.333, -49.117], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

const COLOR = { ok: '#2ecc71', hoje: '#f39c12', vencida: '#e74c3c' };

function makeIcon(status) {
  const c = COLOR[status] || '#aaa';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:32px;height:32px;
      background:${c};
      border:3px solid #fff;
      border-radius:50%;
      box-shadow:0 2px 8px rgba(0,0,0,.6);
    "></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  });
}

let markersMap = {};   // id -> L.marker

function buildPopupHtml(c) {
  const status = getStatus(c.dataBuscar);
  const color  = COLOR[status];
  return `
    <div style="font-size:15px;line-height:1.55;min-width:200px;">
      <strong style="font-size:18px;display:block;margin-bottom:4px;">${esc(c.nome)}</strong>
      ${c.telefone ? `<span>Tel: ${esc(c.telefone)}</span><br>` : ''}
      <span>Deixou: ${fmtDate(c.dataDeixou)}</span><br>
      <span>Buscar: ${fmtDate(c.dataBuscar)}</span><br>
      ${c.obs ? `<span style="color:#555;">Obs: ${esc(c.obs)}</span><br>` : ''}
      <span style="display:inline-block;margin:6px 0;padding:3px 10px;background:${color};
                   border-radius:12px;font-weight:bold;color:${status==='ok'?'#000':status==='hoje'?'#000':'#fff'};">
        ${statusLabel(status)}
      </span>
      <button onclick="openEditModal('${c.id}')"
        style="display:block;width:100%;margin-top:8px;min-height:46px;
               background:#7b1fa2;color:#fff;border:none;border-radius:7px;
               font-size:16px;font-weight:bold;cursor:pointer;">
        EDITAR
      </button>
    </div>`;
}

function addMarker(c) {
  if (c.lat == null || c.lng == null) return;
  const status = getStatus(c.dataBuscar);
  const m = L.marker([c.lat, c.lng], { icon: makeIcon(status) });
  m.bindPopup(buildPopupHtml(c), { maxWidth: 300 });
  m.addTo(map);
  markersMap[c.id] = m;
}

function removeMarker(id) {
  if (markersMap[id]) { map.removeLayer(markersMap[id]); delete markersMap[id]; }
}

function updateMarker(c) {
  removeMarker(c.id);
  addMarker(c);
}

function rebuildAllMarkers() {
  Object.values(markersMap).forEach(m => map.removeLayer(m));
  markersMap = {};
  loadData().forEach(addMarker);
}

// Expose for popup onclick
window.openEditModal = openEditModal;

// ============================================================
// FORM MODAL
// ============================================================
let pendingLatlng = null;
let editingId = null;

function openNewModal(latlng) {
  pendingLatlng = latlng;
  editingId = null;
  document.getElementById('modal-titulo').textContent = 'Nova Caçamba';
  document.getElementById('form-cacamba').reset();
  document.getElementById('inp-deixou').value = getToday();
  showOverlay('modal-overlay');
}

function openEditModal(id) {
  const c = loadData().find(x => x.id === id);
  if (!c) return;
  editingId = id;
  pendingLatlng = null;
  document.getElementById('modal-titulo').textContent = 'Editar Caçamba';
  document.getElementById('inp-nome').value    = c.nome || '';
  document.getElementById('inp-tel').value     = c.telefone || '';
  document.getElementById('inp-deixou').value  = c.dataDeixou || getToday();
  document.getElementById('inp-buscar').value  = c.dataBuscar || '';
  document.getElementById('inp-obs').value     = c.obs || '';
  map.closePopup();
  showOverlay('modal-overlay');
}

function closeModal() {
  hideOverlay('modal-overlay');
  pendingLatlng = null;
  editingId = null;
}

document.getElementById('btn-cancelar').addEventListener('click', closeModal);

document.getElementById('form-cacamba').addEventListener('submit', function(e) {
  e.preventDefault();

  const nome      = document.getElementById('inp-nome').value.trim();
  const telefone  = document.getElementById('inp-tel').value.trim();
  const dataDeixou= document.getElementById('inp-deixou').value;
  const dataBuscar= document.getElementById('inp-buscar').value;
  const obs       = document.getElementById('inp-obs').value.trim();

  if (!nome) { alert('Informe o nome do cliente.'); return; }
  if (!dataBuscar) { alert('Informe a data para buscar.'); return; }

  const data = loadData();

  if (editingId) {
    const idx = data.findIndex(x => x.id === editingId);
    if (idx >= 0) {
      data[idx] = { ...data[idx], nome, telefone, dataDeixou, dataBuscar, obs };
      saveData(data);
      updateMarker(data[idx]);
    }
  } else if (pendingLatlng) {
    const nova = {
      id: genId(),
      lat: pendingLatlng.lat,
      lng: pendingLatlng.lng,
      nome, telefone, dataDeixou, dataBuscar, obs
    };
    data.push(nova);
    saveData(data);
    addMarker(nova);
  }

  closeModal();
});

// ============================================================
// MAP CLICK
// ============================================================
map.on('click', function(e) {
  openNewModal(e.latlng);
});

// ============================================================
// LIST SCREEN
// ============================================================
function showListScreen() {
  const data = loadData().slice().sort((a, b) => {
    if (!a.dataBuscar) return 1;
    if (!b.dataBuscar) return -1;
    return a.dataBuscar.localeCompare(b.dataBuscar);
  });

  const container = document.getElementById('lista-container');

  if (data.length === 0) {
    container.innerHTML = `
      <div class="empty-msg">
        Nenhuma caçamba cadastrada.<br><br>
        Toque no mapa para adicionar.
      </div>`;
  } else {
    container.innerHTML = data.map(c => {
      const s = getStatus(c.dataBuscar);
      return `
        <div class="cacamba-item status-${s}" id="item-${c.id}">
          <div class="cacamba-nome">${esc(c.nome)}</div>
          <div class="cacamba-info">
            Deixou: ${fmtDate(c.dataDeixou)}&nbsp;&nbsp;|&nbsp;&nbsp;Buscar: ${fmtDate(c.dataBuscar)}
            ${c.telefone ? `<br>Tel: ${esc(c.telefone)}` : ''}
            ${c.obs ? `<br>Obs: ${esc(c.obs)}` : ''}
          </div>
          <div class="cacamba-status-badge">${statusLabel(s)}</div>
          <div class="cacamba-btns">
            <button class="btn-busquei"  onclick="acaoBusquei('${c.id}')">BUSQUEI</button>
            <button class="btn-editar"   onclick="acaoEditar('${c.id}')">EDITAR</button>
            <button class="btn-ver-mapa" onclick="acaoVerMapa('${c.id}')">VER NO MAPA</button>
            <button class="btn-apagar"   onclick="acaoConfirmarApagar('${c.id}')">APAGAR</button>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('list-screen').style.display = 'block';
}

function hideListScreen() {
  document.getElementById('list-screen').style.display = 'none';
}

window.acaoBusquei = function(id) {
  const data = loadData().filter(x => x.id !== id);
  saveData(data);
  removeMarker(id);
  showListScreen();
};

window.acaoEditar = function(id) {
  hideListScreen();
  openEditModal(id);
};

window.acaoVerMapa = function(id) {
  const c = loadData().find(x => x.id === id);
  hideListScreen();
  if (c && markersMap[id]) {
    map.setView([c.lat, c.lng], 17);
    setTimeout(() => markersMap[id].openPopup(), 300);
  }
};

let deletingId = null;
window.acaoConfirmarApagar = function(id) {
  deletingId = id;
  showOverlay('confirm-overlay');
};

document.getElementById('btn-confirmar-apagar').addEventListener('click', function() {
  if (deletingId) {
    const data = loadData().filter(x => x.id !== deletingId);
    saveData(data);
    removeMarker(deletingId);
    deletingId = null;
  }
  hideOverlay('confirm-overlay');
  showListScreen();
});

document.getElementById('btn-cancelar-apagar').addEventListener('click', function() {
  deletingId = null;
  hideOverlay('confirm-overlay');
});

document.getElementById('btn-ver-lista').addEventListener('click', showListScreen);
document.getElementById('btn-voltar-mapa').addEventListener('click', hideListScreen);

// ============================================================
// OVERLAY HELPERS
// ============================================================
function showOverlay(id) { document.getElementById(id).classList.add('active'); }
function hideOverlay(id) { document.getElementById(id).classList.remove('active'); }

// ============================================================
// ALERT
// ============================================================
function showAlert(msg) {
  document.getElementById('alert-msg').textContent = msg;
  showOverlay('alert-overlay');
}

document.getElementById('btn-fechar-alert').addEventListener('click', function() {
  hideOverlay('alert-overlay');
});

// ============================================================
// INIT
// ============================================================
(function init() {
  rebuildAllMarkers();

  const vencidas = loadData().filter(c => getStatus(c.dataBuscar) === 'vencida');
  if (vencidas.length > 0) {
    const nomes = vencidas.slice(0, 3).map(c => c.nome).join(', ');
    const extra = vencidas.length > 3 ? ` e mais ${vencidas.length - 3}` : '';
    showAlert(
      `${vencidas.length} caçamba(s) com prazo VENCIDO!\n\n${nomes}${extra}`
    );
  }
})();
</script>
</body>
</html>
