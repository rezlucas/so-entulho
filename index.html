<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Só Entulho - Goianésia-GO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ===== DESIGN TOKENS ===== */
    :root {
      --brand:        #E65100;
      --brand-dark:   #BF360C;
      --brand-light:  #FF6D00;
      --bg:           #141414;
      --surface:      #1f1f1f;
      --surface-2:    #2a2a2a;
      --border:       #333;
      --text:         #f2f2f2;
      --text-muted:   #999;
      --green:        #43a047;
      --green-dark:   #2e7d32;
      --yellow:       #f9a825;
      --red:          #e53935;
      --red-dark:     #c62828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 18px;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    /* ===== MAP SCREEN ===== */
    #map-screen {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    #map { width: 100%; height: 100%; }

    /* Brand badge over map */
    #map-brand {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: var(--brand);
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 17px;
      letter-spacing: 1px;
      padding: 8px 20px;
      border-radius: 30px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
      pointer-events: none;
      white-space: nowrap;
    }

    #btn-ver-lista {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 16px 40px;
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
      font-weight: 700;
      min-height: 55px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(230,81,0,0.5);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    #btn-ver-lista:active { background: var(--brand-dark); }

    /* ===== LIST SCREEN ===== */
    #list-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      z-index: 2000;
      overflow-y: auto;
      padding: 0 0 100px;
    }

    /* Header da lista */
    #list-header {
      background: var(--surface);
      border-bottom: 3px solid var(--brand);
      padding: 18px 16px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #list-header .logo-mark {
      background: var(--brand);
      color: #fff;
      font-weight: 900;
      font-size: 18px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      letter-spacing: -1px;
    }

    #list-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    #list-header h1 span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
    }

    #list-body { padding: 16px 16px 0; }

    .cacamba-item {
      background: var(--surface);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 6px solid var(--border);
    }

    .cacamba-item.status-ok      { border-left-color: var(--green); }
    .cacamba-item.status-hoje    { border-left-color: var(--yellow); }
    .cacamba-item.status-vencida { border-left-color: var(--red); }

    .cacamba-nome {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .cacamba-info {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 10px;
    }

    .cacamba-info strong { color: #ccc; font-weight: 500; }

    .cacamba-status-badge {
      display: inline-block;
      padding: 4px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: 0.4px;
    }

    .status-ok      .cacamba-status-badge { background: var(--green);  color: #fff; }
    .status-hoje    .cacamba-status-badge { background: var(--yellow); color: #000; }
    .status-vencida .cacamba-status-badge { background: var(--red);    color: #fff; }

    .cacamba-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .cacamba-btns button {
      flex: 1;
      min-width: 80px;
      min-height: 52px;
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 0.3px;
    }

    .btn-busquei  { background: var(--green);  color: #fff; }
    .btn-apagar   { background: var(--red);    color: #fff; }
    .btn-ver-mapa { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-editar   { background: var(--brand);  color: #fff; }

    .btn-busquei:active  { background: var(--green-dark); }
    .btn-apagar:active   { background: var(--red-dark); }
    .btn-ver-mapa:active { background: #383838; }
    .btn-editar:active   { background: var(--brand-dark); }

    #btn-voltar-mapa {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3000;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 36px;
      font-family: 'Roboto', sans-serif;
      font-size: 19px;
      font-weight: 700;
      min-height: 55px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
      white-space: nowrap;
    }

    #btn-voltar-mapa:active { background: #383838; }

    /* ===== FORM MODAL ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    #modal-overlay.active { display: flex; }

    #modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      max-height: 92vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Faixa laranja no topo do modal */
    #modal-header {
      background: var(--brand);
      padding: 18px 20px;
      border-radius: 14px 14px 0 0;
    }

    #modal-titulo {
      font-size: 21px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: 0.3px;
    }

    #modal-body {
      padding: 22px 20px 24px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 7px;
      color: #ccc;
      letter-spacing: 0.2px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      padding: 13px 12px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      min-height: 52px;
    }

    .form-group textarea {
      min-height: 88px;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--brand);
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      margin-top: 22px;
    }

    .modal-btns button {
      flex: 1;
      min-height: 58px;
      font-family: 'Roboto', sans-serif;
      font-size: 19px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.4px;
    }

    #btn-salvar   { background: var(--brand); color: #fff; }
    #btn-cancelar { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }
    #btn-salvar:active   { background: var(--brand-dark); }
    #btn-cancelar:active { background: #383838; }

    /* ===== ALERT ===== */
    #alert-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #alert-overlay.active { display: flex; }

    #alert-box {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #alert-box-top {
      background: var(--red);
      padding: 24px 20px 20px;
    }

    #alert-box-top h2 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    #alert-box-body {
      padding: 20px 20px 24px;
    }

    #alert-msg {
      font-size: 19px;
      margin-bottom: 24px;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-line;
    }

    #btn-fechar-alert {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px 36px;
      font-family: 'Roboto', sans-serif;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      min-height: 55px;
      width: 100%;
    }

    #btn-fechar-alert:active { background: var(--brand-dark); }

    /* ===== CONFIRM ===== */
    #confirm-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.88);
      z-index: 8000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #confirm-overlay.active { display: flex; }

    #confirm-box {
      background: var(--surface);
      border-radius: 14px;
      padding: 30px 22px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--border);
    }

    #confirm-box p {
      font-size: 20px;
      margin-bottom: 26px;
      color: var(--text);
      line-height: 1.5;
    }

    .confirm-btns { display: flex; gap: 12px; }

    .confirm-btns button {
      flex: 1;
      min-height: 55px;
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #btn-confirmar-apagar { background: var(--red);    color: #fff; }
    #btn-cancelar-apagar  { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }

    /* ===== LEAFLET POPUP OVERRIDE ===== */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      font-family: 'Roboto', sans-serif;
    }

    .leaflet-popup-content { margin: 12px 14px; min-width: 200px; }

    /* ===== EMPTY STATE ===== */
    .empty-msg {
      text-align: center;
      color: var(--text-muted);
      margin-top: 60px;
      font-size: 20px;
      line-height: 1.7;
    }

    .empty-msg .empty-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 14px;
    }

    /* ===== SEARCH BUTTON ===== */
    #btn-buscar-rua {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 1000;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #btn-buscar-rua:active { background: var(--brand-dark); }

    /* ===== SEARCH MODAL ===== */
    #search-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      z-index: 6000;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 14px 14px;
    }

    #search-overlay.active { display: flex; }

    #search-box {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #search-header {
      background: var(--brand);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #search-header span {
      font-size: 20px;
    }

    #search-header h2 {
      font-size: 19px;
      font-weight: 700;
      color: #fff;
      flex: 1;
    }

    #btn-fechar-search {
      background: rgba(0,0,0,0.25);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #search-body { padding: 18px; }

    #search-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    #inp-rua {
      flex: 1;
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      padding: 13px 12px;
      border-radius: 8px;
      border: 2px solid var(--border);
      background: var(--bg);
      color: var(--text);
      min-height: 52px;
    }

    #inp-rua:focus {
      outline: none;
      border-color: var(--brand);
    }

    #btn-executar-busca {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      min-height: 52px;
      min-width: 52px;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #btn-executar-busca:active { background: var(--brand-dark); }

    #search-status {
      font-size: 16px;
      color: var(--text-muted);
      min-height: 22px;
      text-align: center;
    }

    #search-results { margin-top: 10px; }

    .search-result-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 16px;
      color: var(--text);
      line-height: 1.4;
    }

    .search-result-item:active {
      background: var(--surface-2);
    }

    .search-result-item .result-nome {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 3px;
    }

    .search-result-item .result-detalhe {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ===== RESPONSIVE 320px ===== */
    @media (max-width: 360px) {
      body { font-size: 16px; }
      #modal-body { padding: 16px 14px 20px; }
      .cacamba-btns button { font-size: 12px; min-height: 48px; }
      .modal-btns button { font-size: 17px; }
      #list-header h1 { font-size: 19px; }
    }
  </style>
</head>
<body>

<!-- MAP SCREEN -->
<div id="map-screen">
  <div id="map"></div>
  <div id="map-brand">SÓ ENTULHO</div>
  <button id="btn-buscar-rua" title="Buscar rua">&#128269;</button>
  <button id="btn-ver-lista">&#9776; VER LISTA</button>
</div>

<!-- SEARCH MODAL -->
<div id="search-overlay">
  <div id="search-box">
    <div id="search-header">
      <span>&#128269;</span>
      <h2>Buscar rua</h2>
      <button id="btn-fechar-search">&#10005;</button>
    </div>
    <div id="search-body">
      <div id="search-input-wrap">
        <input type="text" id="inp-rua" placeholder="Ex: Rua das Flores" autocomplete="off">
        <button id="btn-executar-busca">&#128269;</button>
      </div>
      <div id="search-status"></div>
      <div id="search-results"></div>
    </div>
  </div>
</div>

<!-- LIST SCREEN -->
<div id="list-screen">
  <div id="list-header">
    <div class="logo-mark">SE</div>
    <h1>Só Entulho <span>Goianésia-GO</span></h1>
  </div>
  <div id="list-body">
    <div id="lista-container"></div>
  </div>
  <button id="btn-voltar-mapa">&#8592; VOLTAR AO MAPA</button>
</div>

<!-- FORM MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-header">
      <h2 id="modal-titulo">Nova Caçamba</h2>
    </div>
    <div id="modal-body">
    <form id="form-cacamba" novalidate>
      <div class="form-group">
        <label for="inp-nome">Nome do cliente *</label>
        <input type="text" id="inp-nome" placeholder="Nome completo" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="inp-tel">Telefone</label>
        <input type="tel" id="inp-tel" placeholder="(62) 99999-9999" autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="inp-deixou">Data que deixou</label>
        <input type="date" id="inp-deixou">
      </div>
      <div class="form-group">
        <label for="inp-buscar">Data para buscar *</label>
        <input type="date" id="inp-buscar">
      </div>
      <div class="form-group">
        <label for="inp-obs">Observações</label>
        <textarea id="inp-obs" placeholder="Endereço, referência, etc..."></textarea>
      </div>
      <div class="modal-btns">
        <button type="button" id="btn-cancelar">CANCELAR</button>
        <button type="submit" id="btn-salvar">SALVAR</button>
      </div>
    </form>
    </div>
  </div>
</div>

<!-- ALERT OVERLAY -->
<div id="alert-overlay">
  <div id="alert-box">
    <div id="alert-box-top"><h2>⚠ ATENÇÃO</h2></div>
    <div id="alert-box-body">
      <p id="alert-msg"></p>
      <button id="btn-fechar-alert">OK, ENTENDI</button>
    </div>
  </div>
</div>

<!-- CONFIRM OVERLAY -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <p>Tem certeza que deseja apagar esta caçamba?</p>
    <div class="confirm-btns">
      <button id="btn-cancelar-apagar">NÃO</button>
      <button id="btn-confirmar-apagar">SIM, APAGAR</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';

// ============================================================
// DATA LAYER
// ============================================================
const STORAGE_KEY = 'cacambas_goianesia_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveData(arr) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function getToday() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getStatus(dataBuscar) {
  const t = getToday();
  if (!dataBuscar) return 'ok';
  if (dataBuscar < t) return 'vencida';
  if (dataBuscar === t) return 'hoje';
  return 'ok';
}

function statusLabel(s) {
  return s === 'vencida' ? 'VENCIDA' : s === 'hoje' ? 'VENCE HOJE' : 'NO PRAZO';
}

function fmtDate(iso) {
  if (!iso) return '-';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// MAP
// ============================================================
const map = L.map('map', { zoomControl: true, attributionControl: false })
              .setView([-15.333, -49.117], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

const COLOR = { ok: '#2ecc71', hoje: '#f39c12', vencida: '#e74c3c' };

function makeIcon(status) {
  const c = COLOR[status] || '#aaa';
  return L.divIcon({
    className: '',
    html: `<div style="
      width:32px;height:32px;
      background:${c};
      border:3px solid #fff;
      border-radius:50%;
      box-shadow:0 2px 8px rgba(0,0,0,.6);
    "></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  });
}

let markersMap = {};   // id -> L.marker

function buildPopupHtml(c) {
  const status = getStatus(c.dataBuscar);
  const color  = COLOR[status];
  const txtColor = status === 'hoje' ? '#000' : '#fff';
  return `
    <div style="font-size:15px;line-height:1.6;min-width:200px;font-family:'Roboto',Arial,sans-serif;">
      <strong style="font-size:17px;display:block;margin-bottom:6px;color:#111;">${esc(c.nome)}</strong>
      ${c.telefone ? `<span style="color:#444;">Tel: ${esc(c.telefone)}</span><br>` : ''}
      <span style="color:#555;">Deixou: ${fmtDate(c.dataDeixou)}</span><br>
      <span style="color:#555;">Buscar: <strong style="color:#222;">${fmtDate(c.dataBuscar)}</strong></span><br>
      ${c.obs ? `<span style="color:#777;font-size:13px;">Obs: ${esc(c.obs)}</span><br>` : ''}
      <span style="display:inline-block;margin:8px 0 6px;padding:4px 12px;background:${color};
                   border-radius:12px;font-weight:700;font-size:13px;color:${txtColor};">
        ${statusLabel(status)}
      </span>
      <button onclick="openEditModal('${c.id}')"
        style="display:block;width:100%;margin-top:6px;min-height:46px;
               background:#E65100;color:#fff;border:none;border-radius:8px;
               font-family:'Roboto',Arial,sans-serif;font-size:15px;font-weight:700;cursor:pointer;">
        EDITAR
      </button>
    </div>`;
}

function addMarker(c) {
  if (c.lat == null || c.lng == null) return;
  const status = getStatus(c.dataBuscar);
  const m = L.marker([c.lat, c.lng], { icon: makeIcon(status) });
  m.bindPopup(buildPopupHtml(c), { maxWidth: 300 });
  m.addTo(map);
  markersMap[c.id] = m;
}

function removeMarker(id) {
  if (markersMap[id]) { map.removeLayer(markersMap[id]); delete markersMap[id]; }
}

function updateMarker(c) {
  removeMarker(c.id);
  addMarker(c);
}

function rebuildAllMarkers() {
  Object.values(markersMap).forEach(m => map.removeLayer(m));
  markersMap = {};
  loadData().forEach(addMarker);
}

// Expose for popup onclick
window.openEditModal = openEditModal;

// ============================================================
// FORM MODAL
// ============================================================
let pendingLatlng = null;
let editingId = null;

function openNewModal(latlng) {
  pendingLatlng = latlng;
  editingId = null;
  document.getElementById('modal-titulo').textContent = 'Nova Caçamba';
  document.getElementById('form-cacamba').reset();
  document.getElementById('inp-deixou').value = getToday();
  showOverlay('modal-overlay');
}

function openEditModal(id) {
  const c = loadData().find(x => x.id === id);
  if (!c) return;
  editingId = id;
  pendingLatlng = null;
  document.getElementById('modal-titulo').textContent = 'Editar Caçamba';
  document.getElementById('inp-nome').value    = c.nome || '';
  document.getElementById('inp-tel').value     = c.telefone || '';
  document.getElementById('inp-deixou').value  = c.dataDeixou || getToday();
  document.getElementById('inp-buscar').value  = c.dataBuscar || '';
  document.getElementById('inp-obs').value     = c.obs || '';
  map.closePopup();
  showOverlay('modal-overlay');
}

function closeModal() {
  hideOverlay('modal-overlay');
  pendingLatlng = null;
  editingId = null;
}

document.getElementById('btn-cancelar').addEventListener('click', closeModal);

document.getElementById('form-cacamba').addEventListener('submit', function(e) {
  e.preventDefault();

  const nome      = document.getElementById('inp-nome').value.trim();
  const telefone  = document.getElementById('inp-tel').value.trim();
  const dataDeixou= document.getElementById('inp-deixou').value;
  const dataBuscar= document.getElementById('inp-buscar').value;
  const obs       = document.getElementById('inp-obs').value.trim();

  if (!nome) { alert('Informe o nome do cliente.'); return; }
  if (!dataBuscar) { alert('Informe a data para buscar.'); return; }

  const data = loadData();

  if (editingId) {
    const idx = data.findIndex(x => x.id === editingId);
    if (idx >= 0) {
      data[idx] = { ...data[idx], nome, telefone, dataDeixou, dataBuscar, obs };
      saveData(data);
      updateMarker(data[idx]);
    }
  } else if (pendingLatlng) {
    const nova = {
      id: genId(),
      lat: pendingLatlng.lat,
      lng: pendingLatlng.lng,
      nome, telefone, dataDeixou, dataBuscar, obs
    };
    data.push(nova);
    saveData(data);
    addMarker(nova);
  }

  closeModal();
});

// ============================================================
// MAP CLICK
// ============================================================
map.on('click', function(e) {
  openNewModal(e.latlng);
});

// ============================================================
// LIST SCREEN
// ============================================================
function showListScreen() {
  const data = loadData().slice().sort((a, b) => {
    if (!a.dataBuscar) return 1;
    if (!b.dataBuscar) return -1;
    return a.dataBuscar.localeCompare(b.dataBuscar);
  });

  const container = document.getElementById('lista-container');

  if (data.length === 0) {
    container.innerHTML = `
      <div class="empty-msg">
        <span class="empty-icon">🚛</span>
        Nenhuma caçamba cadastrada.<br>
        Toque no mapa para adicionar.
      </div>`;
  } else {
    container.innerHTML = data.map(c => {
      const s = getStatus(c.dataBuscar);
      return `
        <div class="cacamba-item status-${s}" id="item-${c.id}">
          <div class="cacamba-nome">${esc(c.nome)}</div>
          <div class="cacamba-info">
            Deixou: ${fmtDate(c.dataDeixou)}&nbsp;&nbsp;|&nbsp;&nbsp;Buscar: ${fmtDate(c.dataBuscar)}
            ${c.telefone ? `<br>Tel: ${esc(c.telefone)}` : ''}
            ${c.obs ? `<br>Obs: ${esc(c.obs)}` : ''}
          </div>
          <div class="cacamba-status-badge">${statusLabel(s)}</div>
          <div class="cacamba-btns">
            <button class="btn-busquei"  onclick="acaoBusquei('${c.id}')">BUSQUEI</button>
            <button class="btn-editar"   onclick="acaoEditar('${c.id}')">EDITAR</button>
            <button class="btn-ver-mapa" onclick="acaoVerMapa('${c.id}')">VER NO MAPA</button>
            <button class="btn-apagar"   onclick="acaoConfirmarApagar('${c.id}')">APAGAR</button>
          </div>
        </div>`;
    }).join('');
  }

  document.getElementById('list-screen').style.display = 'block';
}

function hideListScreen() {
  document.getElementById('list-screen').style.display = 'none';
}

window.acaoBusquei = function(id) {
  const data = loadData().filter(x => x.id !== id);
  saveData(data);
  removeMarker(id);
  showListScreen();
};

window.acaoEditar = function(id) {
  hideListScreen();
  openEditModal(id);
};

window.acaoVerMapa = function(id) {
  const c = loadData().find(x => x.id === id);
  hideListScreen();
  if (c && markersMap[id]) {
    map.setView([c.lat, c.lng], 17);
    setTimeout(() => markersMap[id].openPopup(), 300);
  }
};

let deletingId = null;
window.acaoConfirmarApagar = function(id) {
  deletingId = id;
  showOverlay('confirm-overlay');
};

document.getElementById('btn-confirmar-apagar').addEventListener('click', function() {
  if (deletingId) {
    const data = loadData().filter(x => x.id !== deletingId);
    saveData(data);
    removeMarker(deletingId);
    deletingId = null;
  }
  hideOverlay('confirm-overlay');
  showListScreen();
});

document.getElementById('btn-cancelar-apagar').addEventListener('click', function() {
  deletingId = null;
  hideOverlay('confirm-overlay');
});

document.getElementById('btn-ver-lista').addEventListener('click', showListScreen);
document.getElementById('btn-voltar-mapa').addEventListener('click', hideListScreen);

// ============================================================
// OVERLAY HELPERS
// ============================================================
function showOverlay(id) { document.getElementById(id).classList.add('active'); }
function hideOverlay(id) { document.getElementById(id).classList.remove('active'); }

// ============================================================
// ALERT
// ============================================================
function showAlert(msg) {
  document.getElementById('alert-msg').textContent = msg;
  showOverlay('alert-overlay');
}

document.getElementById('btn-fechar-alert').addEventListener('click', function() {
  hideOverlay('alert-overlay');
});

// ============================================================
// SEARCH / GEOCODER
// ============================================================
document.getElementById('btn-buscar-rua').addEventListener('click', function() {
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('search-status').textContent = '';
  document.getElementById('inp-rua').value = '';
  showOverlay('search-overlay');
  setTimeout(() => document.getElementById('inp-rua').focus(), 100);
});

document.getElementById('btn-fechar-search').addEventListener('click', function() {
  hideOverlay('search-overlay');
});

document.getElementById('inp-rua').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') executarBusca();
});

document.getElementById('btn-executar-busca').addEventListener('click', executarBusca);

function executarBusca() {
  const termo = document.getElementById('inp-rua').value.trim();
  if (!termo) return;

  const status  = document.getElementById('search-status');
  const results = document.getElementById('search-results');
  status.textContent  = 'Buscando...';
  results.innerHTML   = '';

  const query = encodeURIComponent(`${termo}, Goianésia, Goiás, Brasil`);
  const url   = `https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=5&accept-language=pt-BR`;

  fetch(url, { headers: { 'Accept-Language': 'pt-BR' } })
    .then(r => r.json())
    .then(data => {
      status.textContent = '';

      if (!data.length) {
        status.textContent = 'Nenhum resultado encontrado.';
        return;
      }

      results.innerHTML = data.map((item, i) => {
        const partes    = item.display_name.split(',');
        const nome      = partes[0].trim();
        const detalhe   = partes.slice(1, 3).join(',').trim();
        return `
          <div class="search-result-item" onclick="irParaResultado(${item.lat}, ${item.lon})">
            <div class="result-nome">${esc(nome)}</div>
            <div class="result-detalhe">${esc(detalhe)}</div>
          </div>`;
      }).join('');
    })
    .catch(() => {
      status.textContent = 'Erro na busca. Verifique sua internet.';
    });
}

window.irParaResultado = function(lat, lon) {
  hideOverlay('search-overlay');
  map.setView([parseFloat(lat), parseFloat(lon)], 17);

  // Marca temporária que some após 4 segundos
  const pin = L.circleMarker([lat, lon], {
    radius: 14,
    color: '#E65100',
    fillColor: '#E65100',
    fillOpacity: 0.35,
    weight: 3
  }).addTo(map);

  setTimeout(() => map.removeLayer(pin), 4000);
};

// ============================================================
// INIT
// ============================================================
(function init() {
  rebuildAllMarkers();

  const vencidas = loadData().filter(c => getStatus(c.dataBuscar) === 'vencida');
  if (vencidas.length > 0) {
    const nomes = vencidas.slice(0, 3).map(c => c.nome).join(', ');
    const extra = vencidas.length > 3 ? ` e mais ${vencidas.length - 3}` : '';
    showAlert(
      `${vencidas.length} caçamba(s) com prazo VENCIDO!\n\n${nomes}${extra}`
    );
  }
})();
</script>
</body>
</html>
